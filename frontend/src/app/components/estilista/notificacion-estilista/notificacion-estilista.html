<div class="notif-page">
  <app-estilista-navbar
    [active]="'notificaciones'"
    (navigate)="onNavigate($event)"
    (logout)="onLogout()">
  </app-estilista-navbar>

  <main class="main-layout">
    <header class="page-header">
      <div class="header-left">
        <h1>Notificaciones</h1>
        <span class="count-badge" *ngIf="sinLeerCount > 0">{{ sinLeerCount }} sin leer</span>
      </div>
      <div class="header-actions" *ngIf="notificaciones.length > 0">
        <button class="btn-accion btn-leer" (click)="marcarTodas()" *ngIf="sinLeerCount > 0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Marcar todas como leídas
        </button>
        <button class="btn-accion btn-borrar" (click)="borrarTodas()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          Borrar todas
        </button>
      </div>
    </header>

    <!-- Cargando -->
    <div class="loading-msg" *ngIf="cargando">
      <svg style="width:20px;height:20px;animation:spin 1s linear infinite" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
      Cargando notificaciones...
    </div>

    <!-- Error -->
    <p class="error-msg" *ngIf="error">{{ error }}</p>

    <!-- Lista -->
    <div class="notif-list" *ngIf="!cargando && !error">

      <div class="notif-item" *ngFor="let n of notificaciones" [class.unread]="!n.leida">
        <div class="type-indicator" [ngClass]="n.tipo"></div>

        <div class="notif-icon" [ngClass]="n.tipo">
          <svg *ngIf="n.tipo === 'nueva-cita'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <svg *ngIf="n.tipo === 'cancelada'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="12" r="9"/>
            <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <svg *ngIf="n.tipo === 'confirmada'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="12" cy="12" r="9"/><polyline points="9 12 11 14 15 10"/>
          </svg>
          <svg *ngIf="n.tipo === 'recordatorio'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.7 21a2 2 0 0 1-3.4 0"/>
          </svg>
          <svg *ngIf="n.tipo === 'resena'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>

        <div class="notif-body" (click)="marcarComoLeida(n)">
          <div class="notif-top">
            <h3>{{ n.titulo }}</h3>
            <span class="new-tag" *ngIf="!n.leida">Nueva</span>
          </div>
          <p class="notif-msg">{{ n.mensaje }}</p>
          <p class="notif-time">{{ formatearFecha(n.created_at) }}</p>
        </div>

        <div class="notif-actions">
          <button class="btn-read" *ngIf="!n.leida" (click)="marcarComoLeida(n)" title="Marcar como leída">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
          <button class="btn-close" (click)="eliminarNotificacion(n.id)" title="Eliminar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Vacío -->
      <div class="empty-state" *ngIf="notificaciones.length === 0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" width="40" height="40" style="color:#94a3b8;margin-bottom:12px">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.7 21a2 2 0 0 1-3.4 0"/>
        </svg>
        <p>No tienes notificaciones.</p>
      </div>

    </div>
  </main>
</div>
