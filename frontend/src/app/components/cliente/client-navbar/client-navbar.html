<!-- Navbar superior compartido por todas las pantallas del cliente -->
<nav class="top-nav">
  <div class="nav-inner">

    <!-- Logo / Brand: click vuelve a inicio -->
    <div class="nav-brand" (click)="goTo('inicio')">
      <div class="brand-badge">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l1.6 5L19 9l-5.4 2L12 16l-1.6-5L5 9l5.4-2L12 2Z"/>
        </svg>
      </div>
      <span class="brand-text">PonteGuapa</span>
    </div>

    <div class="nav-links">

      <button class="nav-item"
              type="button"
              [class.active]="active === 'inicio'"
              (click)="goTo('inicio')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3Z"/>
        </svg>
        Inicio
      </button>

      <button class="nav-item"
              type="button"
              [class.active]="active === 'reservar'"
              (click)="goTo('reservar')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <rect x="4" y="5" width="16" height="15" rx="2"/>
          <path d="M8 3v4M16 3v4M4 9h16"/>
        </svg>
        Agendar
      </button>

      <button class="nav-item nav-item-2lines"
              type="button"
              [class.active]="active === 'ver'"
              (click)="goTo('ver')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <rect x="4" y="5" width="16" height="15" rx="2"/>
          <path d="M8 10h8M8 14h5"/>
        </svg>
        <span>Mis<br>Citas</span>
      </button>

      <button class="nav-item"
              type="button"
              [class.active]="active === 'servicios'"
              (click)="goTo('servicios')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M12 3l1.6 5L19 9l-5.4 2L12 16l-1.6-5L5 9l5.4-2L12 3Z"/>
        </svg>
        Servicios
      </button>

      <button class="nav-item"
              type="button"
              [class.active]="active === 'promociones'"
              (click)="goTo('promociones')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M20.6 12.6L12.6 4.6A2 2 0 0 0 11.2 4H5a1 1 0 0 0-1 1v6.2a2 2 0 0 0 .6 1.4l8 8a2 2 0 0 0 2.8 0l5.2-5.2a2 2 0 0 0 0-2.8Z"/>
          <circle cx="8.5" cy="8.5" r="1.2" fill="currentColor"/>
        </svg>
        Promociones
      </button>

      <button class="nav-item"
              type="button"
              [class.active]="active === 'recompensas'"
              (click)="goTo('recompensas')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <rect x="3" y="8" width="18" height="4" rx="1"/>
          <path d="M5 12v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-8M12 8v13M12 8H9.5a2.5 2.5 0 1 1 0-5c2 0 2.5 2 2.5 5ZM12 8h2.5a2.5 2.5 0 1 0 0-5c-2 0-2.5 2-2.5 5Z"/>
        </svg>
        Recompensas
      </button>

      <button class="nav-item"
              type="button"
              [class.active]="active === 'resenas'"
              (click)="goTo('resenas')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M12 3l2.7 5.4l6 .9l-4.3 4.2l1 5.9L12 16.8L6.6 19.4l1-5.9L3.3 9.3l6-.9L12 3Z"/>
        </svg>
        Reseñas
      </button>

      <button class="nav-item"
              type="button"
              [class.active]="active === 'perfil'"
              (click)="goTo('perfil')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21a8 8 0 0 1 16 0"/>
        </svg>
        Perfil
      </button>

      <button class="nav-item nav-item-logout" type="button" (click)="cerrarSesion()">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M15 4h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-4M10 17l-5-5l5-5M5 12h11"/>
        </svg>
        Salir
      </button>
    </div>

  </div>
</nav>
