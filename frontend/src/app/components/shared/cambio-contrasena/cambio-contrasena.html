<!-- Pantalla de cambio de contraseña: mismo sistema visual que login y recuperar -->
<div class="auth-page">

  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>
  <div class="bg-circle circle-3"></div>

  <div class="auth-wrapper">

    <!-- Panel izquierdo — marca -->
    <aside class="brand-card">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1 class="brand-name">PonteGuapa</h1>
      <p class="brand-tagline">
        Actualización<br>de seguridad
      </p>
    </aside>

    <!-- Panel derecho — formulario -->
    <section class="form-card">

      <h2 class="form-title">Cambia tu contraseña</h2>
      <p class="form-subtitle">{{ getMensajeInstruccion() }}</p>

      <!-- Error -->
      <div class="error-box" *ngIf="errorMsg">{{ errorMsg }}</div>

      <!-- Éxito -->
      <div class="success-box" *ngIf="exito">
        ¡Contraseña actualizada correctamente! Redirigiendo...
      </div>

      <div class="input-field">
        <label for="nueva">Nueva Contraseña</label>
        <div class="password-wrapper">
          <input [type]="mostrarNueva ? 'text' : 'password'"
                 id="nueva"
                 [(ngModel)]="nuevaPassword"
                 placeholder="Mínimo 6 caracteres"
                 minlength="6">
          <button type="button" class="toggle-eye" (click)="mostrarNueva = !mostrarNueva">
            <svg *ngIf="!mostrarNueva" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="mostrarNueva" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="input-field">
        <label for="confirmar">Confirmar Nueva Contraseña</label>
        <div class="password-wrapper">
          <input [type]="mostrarConfirmar ? 'text' : 'password'"
                 id="confirmar"
                 [(ngModel)]="confirmarPassword"
                 placeholder="Repite la contraseña">
          <button type="button" class="toggle-eye" (click)="mostrarConfirmar = !mostrarConfirmar">
            <svg *ngIf="!mostrarConfirmar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="mostrarConfirmar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
      </div>

      <!-- Indicador de fortaleza -->
      <div class="strength-bar" *ngIf="nuevaPassword.length > 0">
        <div class="strength-track">
          <div class="strength-fill" [ngClass]="fortalezaClass" [style.width]="fortalezaAncho"></div>
        </div>
        <span class="strength-label" [ngClass]="fortalezaClass">{{ fortalezaTexto }}</span>
      </div>

      <button class="primary-btn" (click)="guardarPassword()" [disabled]="guardando">
        {{ guardando ? 'Guardando...' : 'Guardar y Continuar' }}
      </button>

      <button class="secondary-btn" (click)="cancelar()">
        Cancelar y volver al inicio
      </button>

    </section>

  </div>
</div>
