<!-- Pantalla de Registro: misma estructura visual que login -->
<div class="auth-page">

  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>
  <div class="bg-circle circle-3"></div>

  <div class="auth-wrapper">

    <aside class="brand-card">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6L12 2Z"
                fill="currentColor" opacity="0.95"/>
          <path d="M19 14l.9 2.7L22 18l-2.1.6L19 21l-.9-2.4L16 18l2.1-1.3L19 14Z"
                fill="currentColor" opacity="0.7"/>
        </svg>
      </div>
      <h1 class="brand-name">PonteGuapa</h1>
      <p class="brand-tagline">
        Únete a nuestra familia<br>de belleza
      </p>
    </aside>

    <section class="form-card">
      <h2 class="form-title">Crear Cuenta</h2>
      <p class="form-subtitle">Completa tus datos para registrarte</p>

      <!-- Nombre y apellido en dos columnas -->
      <div class="form-row">
        <div class="input-field">
          <label for="nombre">Nombre</label>
          <input id="nombre" type="text" [(ngModel)]="nombre" placeholder="Ana">
        </div>
        <div class="input-field">
          <label for="apellido">Apellido</label>
          <input id="apellido" type="text" [(ngModel)]="apellido" placeholder="García">
        </div>
      </div>

      <div class="input-field">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" [(ngModel)]="email" placeholder="tu@email.com">
      </div>

      <div class="input-field">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input id="password"
                 [type]="mostrarPass ? 'text' : 'password'"
                 [(ngModel)]="pass"
                 placeholder="Mínimo 8 caracteres">
          <button type="button" class="toggle-pass" (click)="mostrarPass = !mostrarPass" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="input-field">
        <label for="telefono">Teléfono</label>
        <div class="phone-wrapper">
          <span class="phone-prefix">+502</span>
          <input id="telefono"
                 type="text"
                 [ngModel]="telefonoDisplay"
                 (input)="onTelInput($event)"
                 placeholder="xxxx-xxxx"
                 maxlength="9"
                 inputmode="numeric">
        </div>
      </div>

      <div class="input-field">
        <label for="fecha">Fecha de Nacimiento</label>
        <input id="fecha"
               type="text"
               [(ngModel)]="fechaNacimiento"
               (keypress)="validarSoloNumeros($event)"
               (input)="formatearFecha($event)"
               placeholder="DD/MM/AAAA"
               maxlength="10"
               class="date-input-field">
        <small class="helper-text">Solo números. Debes ser mayor de 18 años.</small>
      </div>

      <button class="primary-btn" (click)="registrar()" [disabled]="cargando">
        <span *ngIf="!cargando">Crear mi cuenta</span>
        <span *ngIf="cargando" class="btn-loading">
          <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
            <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
          </svg>
          Creando cuenta...
        </span>
      </button>

      <div class="divider"></div>

      <p class="footer-text">
        ¿Ya tienes cuenta?
        <a class="link-pink bold" (click)="irALogin()">Inicia sesión aquí</a>
      </p>
    </section>

  </div>
</div>
