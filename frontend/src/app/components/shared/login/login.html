<!-- Pantalla de Login con layout de dos cards (brand izq + form der) -->
<div class="auth-page">

  <!-- Circulos decorativos difuminados de fondo -->
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>
  <div class="bg-circle circle-3"></div>

  <div class="auth-wrapper">

    <!-- Card izquierda: branding -->
    <aside class="brand-card">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2l1.8 5.4L19 9l-5.2 1.6L12 16l-1.8-5.4L5 9l5.2-1.6L12 2Z"
                fill="currentColor" opacity="0.95"/>
          <path d="M19 14l.9 2.7L22 18l-2.1.6L19 21l-.9-2.4L16 18l2.1-1.3L19 14Z"
                fill="currentColor" opacity="0.7"/>
        </svg>
      </div>
      <h1 class="brand-name">PonteGuapa</h1>
      <p class="brand-tagline">
        Belleza, estilo y confianza<br>en un solo lugar
      </p>
    </aside>

    <!-- Card derecha: formulario -->
    <section class="form-card">
      <h2 class="form-title">Iniciar Sesión</h2>
      <p class="form-subtitle">Ingresa a tu cuenta para continuar</p>

      <div class="input-field">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" [(ngModel)]="email" placeholder="tu@email.com">
      </div>

      <div class="input-field">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input id="password"
                 [type]="mostrarPass ? 'text' : 'password'"
                 [(ngModel)]="pass"
                 placeholder="••••••••">
          <button type="button" class="toggle-pass" (click)="mostrarPass = !mostrarPass" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="extra-row">
        <a class="link-pink" (click)="irAOlvide()">¿Olvidaste tu contraseña?</a>
      </div>

      <button class="primary-btn" (click)="iniciarSesion()" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>

      <div class="divider"></div>

      <p class="footer-text">
        ¿No tienes cuenta?
        <a class="link-pink bold" (click)="irARegistro()">Regístrate aquí</a>
      </p>
    </section>

  </div>
</div>
